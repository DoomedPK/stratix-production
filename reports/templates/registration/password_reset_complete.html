{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | Stratix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
       body {
        background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'images/abstract-bg.jpg' %}");
        background-size: cover; background-position: center center; background-repeat: no-repeat;
        min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
       }
        .glass-login-card {
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 50px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="glass-login-card text-center">
        <i class="fas fa-check-circle fs-1 text-success mb-3"></i>
        <h3 class="fw-bold mb-3">Password Updated</h3>
        <p class="text-white text-opacity-75 small mb-4">Your password has been successfully changed. You may now proceed to log in with your new credentials.</p>
        <a href="{% url 'login' %}" class="btn w-100 fw-bold rounded-3 py-3" style="background-color: #ffc107; color: #000; text-transform: uppercase;">Log In Now</a>
    </div>
</body>
</html>
