{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Stratix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
       body {
        background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'images/abstract-bg.jpg' %}");
        background-size: cover; background-position: center center; background-repeat: no-repeat;
        min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
       }
        .glass-login-card {
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 50px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .form-control { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff !important; border-radius: 10px; padding: 12px 15px; }
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: #ffc107; box-shadow: 0 0 10px rgba(255, 193, 7, 0.3); outline: none; }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-label { color: rgba(255, 255, 255, 0.85); font-weight: 600; font-size: 0.9rem; margin-bottom: 5px;}
        .btn-stratix-warning { background-color: #ffc107; color: #000; font-weight: 800; border-radius: 10px; padding: 12px; border: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        .btn-stratix-warning:hover { background-color: #e0a800; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);}
    </style>
</head>
<body>
    <div class="glass-login-card text-center">
        <i class="fas fa-lock fs-1 text-warning mb-3"></i>
        <h3 class="fw-bold mb-2">Reset Password</h3>
        <p class="text-white text-opacity-75 small mb-4">Enter your email address and we will send you a link to securely reset your password.</p>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter registered email" required>
            </div>
            <button type="submit" class="btn btn-stratix-warning w-100 mb-3">Send Reset Link</button>
            <div class="text-center">
                <a href="{% url 'login' %}" class="text-light small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
