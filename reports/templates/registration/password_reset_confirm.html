{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Stratix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
       body {
        background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'images/abstract-bg.jpg' %}");
        background-size: cover; background-position: center center; background-repeat: no-repeat;
        min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
       }
        .glass-login-card {
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 50px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .form-control { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: #fff !important; border-radius: 10px; padding: 12px 15px; margin-bottom: 1rem;}
        .form-control:focus { background: rgba(255, 255, 255, 0.15); border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); outline: none; }
        .form-label { color: rgba(255, 255, 255, 0.85); font-weight: 600; font-size: 0.9rem; margin-bottom: 5px;}
        .btn-stratix-success { background-color: #10b981; color: #fff; font-weight: 800; border-radius: 10px; padding: 12px; border: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        .btn-stratix-success:hover { background-color: #059669; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);}
        .helptext { font-size: 0.7rem; color: #94a3b8; display: block; margin-top: -10px; margin-bottom: 15px;}
        ul.errorlist { color: #ef4444; font-size: 0.8rem; list-style: none; padding-left: 0; margin-top: -10px; margin-bottom: 15px;}
    </style>
</head>
<body>
    <div class="glass-login-card text-center">
        {% if validlink %}
            <i class="fas fa-key fs-1 text-success mb-3"></i>
            <h3 class="fw-bold mb-4">Set New Password</h3>
            <form method="POST" class="text-start">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-stratix-success w-100 mt-3">Change Password</button>
            </form>
        {% else %}
            <i class="fas fa-times-circle fs-1 text-danger mb-3"></i>
            <h3 class="fw-bold mb-3">Link Expired</h3>
            <p class="text-white text-opacity-75 small mb-4">The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p>
            <a href="{% url 'password_reset' %}" class="btn btn-stratix-warning w-100 fw-bold border-0 text-dark" style="background-color: #ffc107; padding: 12px; border-radius: 10px;">Request New Link</a>
        {% endif %}
    </div>
</body>
</html>
