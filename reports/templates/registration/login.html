{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stratix Real-Time Tracking</title>
    <link rel="apple-touch-icon" href="{% static 'images/stratix-logo.png' %}">
    <link rel="icon" type="image/png" href="{% static 'images/stratix-logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
       body {
        /* 🚀 Adds a 60% dark overlay directly over the image to hide pixelation */
        background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{% static 'images/abstract-bg.jpg' %}");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        /* 🚀 Removed 'background-attachment: fixed;' as it breaks mobile scaling */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        color: #fff;
        font-family: 'Segoe UI', Roboto, sans-serif;
    }
        /* 🚀 Glassmorphism Container */
        .glass-login-card {
            background: rgba(0, 0, 0, 0.45); /* Semi-transparent black */
            backdrop-filter: blur(12px);     /* Frosted glass effect */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
        }

        .stratix-logo-text {
            color: #ffc107; /* Keep STRATIX yellow */
            font-weight: 900;
            letter-spacing: -2px;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Input Fields styling for dark/glass look */
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff !important;
            border-radius: 10px;
            padding: 12px 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffc107;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
            outline: none;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-label { color: rgba(255, 255, 255, 0.85); font-weight: 600; font-size: 0.9rem; margin-bottom: 5px;}
        
        /* 🚀 Password Eye Position */
        .password-wrapper { position: relative; }
        .toggle-password-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
        }
        .toggle-password-eye:hover { color: #ffc107; }

        .btn-stratix-login {
            background-color: #ffc107; 
            color: #000;
            font-weight: 800;
            border-radius: 10px;
            padding: 12px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-stratix-login:hover { background-color: #e0a800; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);}
        .btn-stratix-login:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="glass-login-card text-center">
        <div class="mb-4">
            <img src="{% static 'images/stratix-logo.png' %}" alt="Stratix Logo" height="60" class="mb-2" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
            <h1 class="stratix-logo-text m-0">STRATIX</h1>
            <p class="text-white text-opacity-75 small fw-semibold mt-1">Secure Field Portal</p>
        </div>
        
        {% if form.errors %}
            <div class="alert alert-danger text-start py-2 px-3 small rounded-3" style="background: rgba(220, 53, 69, 0.8); color: white; border: none;" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i> Invalid username or password.
            </div>
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter password" required>
                    <i class="fas fa-eye toggle-password-eye" id="togglePassword"></i>
                </div>
            </div>
            
            <div class="text-end mb-4">
                <a href="{% url 'password_reset' %}" class="text-warning small text-decoration-none fw-semibold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-stratix-login w-100 mt-2">Log In</button>
        </form>
        
        <div class="mt-4 pt-3 text-center" style="border-top: 1px solid rgba(255,255,255,0.1);">
            <p class="small mb-0" style="color: rgba(255,255,255,0.5);">&copy; Stratix Group</p>
        </div>
    </div>

    <script>
        // JS to make the eye icon toggle the password visibility
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#passwordField');

        togglePassword.addEventListener('click', function (e) {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
