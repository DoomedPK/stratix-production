{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4 h-100">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold text-white mb-0"><i class="fas fa-globe me-2 text-success"></i> Global Deployment & Health Map</h2>
        <a href="{% url 'dashboard_home' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
    </div>
    
    <div class="card p-2 shadow-sm border-secondary" style="height: 75vh; position: relative; border-radius: 12px; overflow: hidden;">
        
        <div id="siteMap" style="height: 100%; width: 100%; z-index: 1; border-radius: 8px;"></div>
        
        <div class="card p-3 shadow-lg border-secondary" style="position: absolute; bottom: 30px; left: 30px; z-index: 1000; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); min-width: 200px;">
            <h6 class="fw-bold text-white mb-3 border-bottom border-secondary pb-2"><i class="fas fa-key me-2 text-warning"></i>Health Legend</h6>
            <div class="d-flex flex-column gap-2 small fw-semibold">
                <span class="text-light"><i class="fas fa-circle text-success me-2"></i> Completed (Good)</span>
                <span class="text-light"><i class="fas fa-circle text-primary me-2"></i> In Progress</span>
                <span class="text-light"><i class="fas fa-circle text-warning me-2"></i> Minor Issue</span>
                <span class="text-light"><i class="fas fa-circle me-2" style="color: #f97316;"></i> Major Issue</span>
                <span class="text-light"><i class="fas fa-circle text-danger me-2"></i> Critical Issue</span>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var map = L.map('siteMap').setView([20, 0], 3);

        // 🚀 ADD THIS LINE: Removes the "Leaflet" prefix
        miniMap.attributionControl.setPrefix(false);
        
        // High-contrast Dark Mode Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        var sites = {{ sites_json|safe }};
        var bounds = [];
        
        sites.forEach(function(site) {
            // Drop the color-coded marker
            var marker = L.circleMarker([site.lat, site.lng], {
                radius: 8,
                fillColor: site.color,
                color: "#0f172a", // Dark border to pop against the map
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);
            
            // Rich Popups
            marker.bindPopup(`
                <div style="min-width: 150px;">
                    <b style="font-size: 1.1rem; color: #1e2937;">${site.name}</b><br>
                    <span style="color: #64748b; font-size: 0.85rem;">${site.site_name}</span>
                    <hr style="margin: 8px 0; border-color: #cbd5e1;">
                    <span style="font-size: 0.9rem;">Status: <b style="color:${site.color}">${site.status}</b></span>
                </div>
            `);
            
            bounds.push([site.lat, site.lng]);
        });

        // Auto-zoom map to fit all pins perfectly
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    });
</script>
{% endblock %}
